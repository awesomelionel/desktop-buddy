[platformio]
default_envs = adafruit_feather_esp32s3_reversetft

[env:adafruit_feather_esp32s3_reversetft]
; pioarduino fork — ships Arduino-ESP32 v3.x (NetworkClientSecure, etc.).
; Pinned so CI builds match local toolchain.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board = adafruit_feather_esp32s3_reversetft
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DARDUINOJSON_ENABLE_PSRAM=1
    ; FW_VERSION is supplied by CI (PLATFORMIO_BUILD_FLAGS). When absent,
    ; firmware_version.h falls back to "0.0.0-dev" so local builds work.
    -DGITHUB_OWNER='"awesomelionel"'
    -DGITHUB_REPO='"desktop-buddy"'
board_build.arduino.memory_type = qio_opi
board_build.partitions = min_spiffs.csv
board_build.embed_files =
    data/github_certs.pem
    data/bus_card_mockup.png
lib_ldf_mode = deep
check_skip_packages = yes
check_src_filters =
    +<src/>
    +<lib/>
check_flags =
    cppcheck: --suppress=*:*/.pio/libdeps/* --suppress=preprocessorErrorDirective --suppress=syntaxError:*type_traits
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    adafruit/Adafruit ST7735 and ST7789 Library
    adafruit/Adafruit GFX Library
    adafruit/Adafruit MAX1704X
    ricmoo/QRCode @ ^0.0.1

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17 -Wall
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
